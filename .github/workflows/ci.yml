name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-typecheck-test:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install minimal dev tools
        run: |
          python -m pip install --upgrade pip
          # Only the deps needed for lint/typecheck/eval-stability. Full pipeline
          # deps (chromadb, llama-index, sentence-transformers, bertopic) are
          # heavy and unnecessary for the offline checks below.
          pip install ruff black mypy pytest pyyaml pydantic pydantic-settings structlog hypothesis

      - name: Ruff
        run: |
          ruff check \
            src/llm_survey/eval \
            src/llm_survey/config.py \
            src/llm_survey/prompts/registry.py \
            src/llm_survey/logging_config.py \
            scripts/compute_eval_metrics.py \
            scripts/run_ablation.py

      - name: Black --check
        run: |
          black --check \
            src/llm_survey/eval \
            src/llm_survey/config.py \
            src/llm_survey/prompts/registry.py \
            src/llm_survey/logging_config.py \
            scripts/compute_eval_metrics.py \
            scripts/run_ablation.py

      - name: Mypy (leaf modules only)
        # Narrow scope intentionally: only the modules that don't pull in heavy
        # untyped deps (chromadb, llama-index, instructor) at import time.
        run: |
          mypy \
            src/llm_survey/eval/stats.py \
            src/llm_survey/eval/cost.py \
            src/llm_survey/eval/runlog.py \
            src/llm_survey/eval/matching.py \
            src/llm_survey/config.py \
            src/llm_survey/prompts/registry.py \
            src/llm_survey/logging_config.py

      - name: Unit tests for new modules
        run: |
          PYTHONPATH=src pytest -q \
            tests/test_eval_stats.py \
            tests/test_eval_cost_runlog.py \
            tests/test_eval_matching.py \
            tests/test_prompt_registry.py \
            tests/test_config.py

      - name: Eval-stability (bootstrap CIs deterministic)
        run: |
          python3 scripts/compute_eval_metrics.py > /tmp/metrics_run1.json
          python3 scripts/compute_eval_metrics.py > /tmp/metrics_run2.json
          # Same input + same seed => byte-identical metrics. If this fails, a
          # nondeterminism bug has been introduced.
          diff -u /tmp/metrics_run1.json /tmp/metrics_run2.json
