# Mirrors the repository to a Hugging Face Space when secrets are configured.
# Required repo secrets: HF_TOKEN, HF_SPACE_REPO (e.g. "username/qualitative-model-drafter").
#
# The Space card metadata lives in `.hf-space-card.yml` and is injected into
# README.md at upload time by `scripts/push_hf_space.py`. This keeps the
# repo README clean of HF-specific YAML frontmatter.

name: Deploy Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install huggingface_hub
        run: pip install "huggingface_hub==0.26.2"

      - name: Upload workspace to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE_REPO: ${{ secrets.HF_SPACE_REPO }}
        run: |
          if [ -z "${HF_SPACE_REPO}" ] || [ -z "${HF_TOKEN}" ]; then
            echo "HF_SPACE_REPO or HF_TOKEN missing — skipping deploy."
            exit 0
          fi
          python3 scripts/push_hf_space.py --upload-only
